<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RGM-3800</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <!-- Verbindung -->
    <section class="card">
      <h2>Verbindung</h2>
      <div class="row">
        <select id="port-select" class="grow"></select>
        <button id="btn-refresh" class="btn">Aktualisieren</button>
        <button id="btn-connect" class="btn">Verbinden</button>
      </div>
      <div id="conn-status" class="status status-idle">
        <span class="dot"></span><span id="conn-text">Nicht verbunden</span>
      </div>
    </section>

    <!-- Download -->
    <section class="card">
      <h2>Download</h2>
      <button id="btn-download" class="btn btn-wide" disabled>Tracklogs laden</button>
      <div class="progress" id="progress-wrap" hidden>
        <div class="progress-bar" id="progress-bar"></div>
        <span class="progress-label" id="progress-label"></span>
      </div>
    </section>

    <!-- Tracks -->
    <section class="card">
      <h2>Tracks</h2>
      <div class="row select-actions">
        <button id="btn-all" class="link" disabled>Alle auswählen</button>
        <button id="btn-none" class="link" disabled>Auswahl aufheben</button>
        <span id="sel-count" class="muted"></span>
      </div>
      <div class="table-wrap">
        <table id="tracks-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="check-header" disabled></th>
              <th class="col-date">Datum</th>
              <th class="col-num">Punkte</th>
              <th class="col-dist">Distanz</th>
            </tr>
          </thead>
          <tbody id="tracks-body">
            <tr class="empty"><td colspan="4">Noch keine Tracks geladen.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Export -->
    <section class="card">
      <h2>Export</h2>
      <div class="row export-row">
        <label class="radio"><input type="radio" name="fmt" value="gpx" checked> GPX</label>
        <label class="radio"><input type="radio" name="fmt" value="csv"> CSV</label>
        <label class="radio"><input type="radio" name="fmt" value="kml"> KML</label>
        <span class="grow"></span>
        <button id="btn-export" class="btn" disabled>Exportieren …</button>
      </div>
    </section>
  </main>

  <footer id="statusbar">Bereit</footer>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
